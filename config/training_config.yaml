# Spectral GAN training configuration

structure:
  N_layers: 10
  pol: 0
  thickness_sup: 0.5
  thickness_bot: 0.05

materials:
  materials_list:
    - Ge
    - SiO2

optics:
  wavelength_range: [3, 6]
  samples_total: 1000
  theta: 0.0
  n_top: 1.0
  n_bot: 1.0
  lorentz_width: 0.02
  lorentz_center_range: [3, 6]
  metal_name: "Au"

generator:
  thickness_noise_dim: 1024
  material_noise_dim: 1024
  alpha_min: 1      # softmax温度下限（训练开始时）
  alpha_max: 5      # softmax温度上限（训练结束时）

training:
  epochs: 100
  batch_size: 512
  save_interval: 10
  noise_level: 0.005
  lambda_gp: 3.0
  d_steps: 1
  g_steps: 2

optimizer:
  lr_gen: 0.001
  lr_disc: 0.0001
  beta1: 0.9
  beta2: 0.999
  weight_decay: 0.0001
