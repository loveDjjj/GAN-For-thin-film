# Spectral GAN training configuration

structure:
  N_layers: 10
  pol: 0
  thickness_sup: 0.5
  thickness_bot: 0.05

materials:
  materials_list:
    - Ge
    - SiO2
    - ZnO
    - YbF3
    - Si

optics:
  wavelength_range: [3, 6]
  samples_total: 1000
  theta: 0.0
  n_top: 1.0
  n_bot: 1.0
  lorentz_width: 0.02
  lorentz_center_range: [3, 6]
  metal_name: "Au"

generator:
  thickness_noise_dim: 1024
  material_noise_dim: 1024
  alpha_min: 1
  alpha_max: 5

training:
  epochs: 100
  batch_size: 512
  save_interval: 1
  noise_level: 0.005
  lambda_gp: 3.0
  d_steps: 1
  g_steps: 2

optimizer:
  lr_gen: 0.001
  lr_disc: 0.0001
  beta1: 0.9
  beta2: 0.999
  weight_decay: 0.0001

visualization:
  checkpoint_sample_count: 8
  sample_export_count: 4
  material_analysis_batch_size: 256
  thickness_histogram_bins: 20
  distribution_epoch_interval: 2
  heatmap_epoch_tick_step: 2

q_evaluation:
  interval: 1
  num_samples: 1024
  dominant_material_prob_threshold: 0.95
  # FOM 评分:
  # RMSE = sqrt(lorentz_mse)
  # Q_score = 1 - exp(-ln(2) * Q / fom_q_ref)
  # RMSE_score = exp(-ln(2) * RMSE / fom_rmse_ref)
  # FOM = valid * (Q_score ^ fom_weight) * (RMSE_score ^ (1 - fom_weight))
  fom_q_ref: 200.0
  fom_rmse_ref: 0.05
  fom_weight: 0.5

high_quality_collection:
  enabled: true
  q_min: 200.0
  mse_max: 0.0025
  peak_min: 0.9
  dominant_material_prob_min: 0.95

reproducibility:
  seed: 20260319
  fix_training_target_centers: true
  center_pool_size: 4096
  fix_q_evaluation_noise: true
